spring.application.name=core-app
server.port=8080

# Konfigurasi Database MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/demo
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=gasi
spring.datasource.password=Very$ecret12

# Hibernate: validate saat runtime, schema di-manage oleh Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway: dimatikan dulu, dikelola manual oleh PluginFlywayConfig
# agar semua lokasi plugin bisa digabung dalam satu instance Flyway
spring.flyway.enabled=false

# Scanning: Pastikan Core bisa mendeteksi Bean dari package manapun
spring.main.allow-bean-definition-overriding=true

# ID Encoding (Sqids)
app.id.salt=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789

# Security: CORS — sesuaikan dengan origin frontend production
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.security.cors.allowed-methods=GET,POST,PUT,DELETE
app.security.cors.allowed-headers=Authorization,Content-Type,X-API-Key,X-Device-Id,X-Device-Model
app.security.cors.exposed-headers=Authorization
app.security.cors.allow-credentials=true
app.security.cors.max-age=86400
